<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Celestial Nexus Hangar Sync</title><link rel="stylesheet" href="popup.css"></head>
<body>
  <main>
    <div class="brand"><div class="mark">CN</div><div><span>Celestial Nexus</span><h1>Hangar Sync</h1></div></div>
    <p class="intro">Scan pledge names from the RSI My Hangar page and keep the snapshot locally until you import it into Celestial Nexus.</p>
    <div id="status" class="status">Checking the active tab…</div>
    <button id="scan" class="primary" disabled>Scan current RSI hangar page</button>
    <div class="grid"><button id="open-rsi">Open RSI Hangar</button><button id="open-toolkit">Open Toolkit</button></div>
    <div class="grid"><button id="export">Export snapshot</button><button id="clear" class="danger">Clear snapshot</button></div>
    <p class="privacy">No RSI password, 2FA code, or session cookie is read or transmitted.</p>
  </main>
<script src="popup.js"></script>
</body>
</html>
