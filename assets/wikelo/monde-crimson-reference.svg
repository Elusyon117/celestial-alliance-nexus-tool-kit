<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Monde Crimson Camo visual reference</title>
  <desc id="desc">A stylized crimson heavy armor silhouette used as a visual reference while exact official artwork is unavailable.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07131f"/>
      <stop offset="1" stop-color="#150913"/>
    </linearGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5476"/>
      <stop offset=".45" stop-color="#981f3d"/>
      <stop offset="1" stop-color="#3d0c1b"/>
    </linearGradient>
    <pattern id="camo" width="36" height="36" patternUnits="userSpaceOnUse">
      <rect width="36" height="36" fill="url(#plate)"/>
      <path d="M0 5h13v9H4v8H0zm19-5h17v12h-8v8H17V9h2zM9 28h18v8H9z" fill="#2c0712" opacity=".72"/>
      <path d="M4 14h9v7H4zm22 8h10v10H26z" fill="#ff7892" opacity=".35"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="640" height="360" fill="url(#bg)"/>
  <path d="M0 286L640 218V360H0Z" fill="#071018"/>
